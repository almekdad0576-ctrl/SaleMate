<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Management - Super Admin</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">📦 OrderCalc</div>
      <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="products.html">📋 Products</a>
        <a href="admins.html" class="active">👥 Admins</a>
        <a href="#" onclick="window.location.href='login.html'">🚪 Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <h2>Admin Management</h2>
        <div class="user-info">Super Admin</div>
      </header>
      <div class="content-area">
        <div class="actions-row">
          <button class="btn btn-primary" onclick="openAddAdminModal()">➕ Add Admin</button>
        </div>

        <table class="data-table" id="adminsTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- dynamically filled -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add/Edit Admin Modal -->
  <div class="modal-overlay" id="adminModal">
    <div class="modal">
      <h3 id="modalTitle">Add New Admin</h3>
      <input type="hidden" id="editAdminId">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="adminName" placeholder="Full name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="adminEmail" placeholder="admin@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPassword" placeholder="Leave blank to keep current">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="adminRole" style="width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;">
          <option value="admin">Admin</option>
          <option value="super_admin">Super Admin</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeAdminModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveAdmin()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // Mock admin users (in real app, fetched from backend)
    const initialAdmins = [
      { id: 1, name: "Super Admin", email: "super@example.com", role: "super_admin" },
      { id: 2, name: "Jane Smith", email: "jane@example.com", role: "admin" },
      { id: 3, name: "Bob Wilson", email: "bob@example.com", role: "admin" }
    ];

    function getAdmins() {
      let admins = JSON.parse(localStorage.getItem('adminsData') || 'null');
      if (!admins || admins.length === 0) {
        admins = initialAdmins;
        localStorage.setItem('adminsData', JSON.stringify(admins));
      }
      return admins;
    }

    function saveAdmins(admins) {
      localStorage.setItem('adminsData', JSON.stringify(admins));
    }

    function renderAdminsTable() {
      const admins = getAdmins();
      const tbody = document.querySelector('#adminsTable tbody');
      if (admins.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No admins found.</td></tr>';
        return;
      }
      tbody.innerHTML = admins.map(a => `
        <tr>
          <td>${a.id}</td>
          <td>${a.name}</td>
          <td>${a.email}</td>
          <td><span class="badge ${a.role === 'super_admin' ? 'badge-success' : 'badge-warning'}">${a.role.replace('_', ' ')}</span></td>
          <td class="actions">
            <button class="btn btn-outline btn-sm" onclick="editAdmin(${a.id})">✏️</button>
            ${a.role !== 'super_admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteAdmin(${a.id})">🗑️</button>` : ''}
          </td>
        </tr>
      `).join('');
    }

    function openAddAdminModal() {
      document.getElementById('modalTitle').textContent = 'Add New Admin';
      document.getElementById('editAdminId').value = '';
      document.getElementById('adminName').value = '';
      document.getElementById('adminEmail').value = '';
      document.getElementById('adminPassword').value = '';
      document.getElementById('adminRole').value = 'admin';
      document.getElementById('adminModal').classList.add('active');
    }

    function editAdmin(id) {
      const admins = getAdmins();
      const admin = admins.find(a => a.id === id);
      if (!admin) return;
      document.getElementById('modalTitle').textContent = 'Edit Admin';
      document.getElementById('editAdminId').value = admin.id;
      document.getElementById('adminName').value = admin.name;
      document.getElementById('adminEmail').value = admin.email;
      document.getElementById('adminPassword').value = '';
      document.getElementById('adminRole').value = admin.role;
      document.getElementById('adminModal').classList.add('active');
    }

    function closeAdminModal() {
      document.getElementById('adminModal').classList.remove('active');
    }

    function saveAdmin() {
      const id = document.getElementById('editAdminId').value;
      const name = document.getElementById('adminName').value.trim();
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;
      const role = document.getElementById('adminRole').value;

      if (!name || !email) {
        alert('Name and email are required.');
        return;
      }

      let admins = getAdmins();

      if (id) {
        // Update existing
        const index = admins.findIndex(a => a.id == id);
        if (index !== -1) {
          admins[index].name = name;
          admins[index].email = email;
          admins[index].role = role;
          // In real app, only update password if provided
          if (password) {
            // admins[index].password = hash(password) ...
          }
        }
      } else {
        // Add new
        const newId = admins.length ? Math.max(...admins.map(a => a.id)) + 1 : 1;
        admins.push({
          id: newId,
          name,
          email,
          role,
          // password would be hashed in backend
        });
      }

      saveAdmins(admins);
      renderAdminsTable();
      closeAdminModal();
    }

    function deleteAdmin(id) {
      if (!confirm('Delete this admin?')) return;
      let admins = getAdmins();
      admins = admins.filter(a => a.id !== id);
      saveAdmins(admins);
      renderAdminsTable();
    }

    // Close modal on overlay click
    document.getElementById('adminModal').addEventListener('click', function(e) {
      if (e.target === this) closeAdminModal();
    });

    // Initial render
    renderAdminsTable();
  </script>
</body>
</html>
