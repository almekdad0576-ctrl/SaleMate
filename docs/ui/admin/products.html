<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Management</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">📦 OrderCalc</div>
      <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="products.html" class="active">📋 Products</a>
        <a href="#" onclick="window.location.href='login.html'">🚪 Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <h2>Product Catalog</h2>
        <div class="user-info">Admin</div>
      </header>
      <div class="content-area">
        <div class="actions-row">
          <button class="btn btn-primary" onclick="openAddEditModal()">➕ Add New Product</button>
        </div>

        <table class="data-table" id="productsTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Buying Price</th>
              <th>Selling Price</th>
              <th>Qty in Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- dynamically filled -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <h3 id="modalTitle">Add Product</h3>
      <input type="hidden" id="editProductId">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="productName" placeholder="Product name">
      </div>
      <div class="form-group">
        <label>Buying Price</label>
        <input type="number" id="buyingPrice" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Selling Price</label>
        <input type="number" id="sellingPrice" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Quantity in Stock</label>
        <input type="number" id="quantityStock" step="1" min="0" value="0">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeProductModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveProduct()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // Load products from localStorage or use default seed data
    function getProducts() {
      let products = JSON.parse(localStorage.getItem('adminProducts') || 'null');
      if (!products || products.length === 0) {
        // Seed data
        products = [
          { id: 1, name: "Widget A", buying_price: 10.00, selling_price: 15.50, quantity_in_stock: 100 },
          { id: 2, name: "Gadget B", buying_price: 25.00, selling_price: 42.00, quantity_in_stock: 50 },
          { id: 3, name: "Doodad C", buying_price: 3.50, selling_price: 7.25, quantity_in_stock: 200 },
          { id: 4, name: "Thingamajig", buying_price: 70.00, selling_price: 99.90, quantity_in_stock: 30 },
          { id: 5, name: "Contraption", buying_price: 80.00, selling_price: 120.00, quantity_in_stock: 15 },
          { id: 6, name: "Module X", buying_price: 35.00, selling_price: 55.55, quantity_in_stock: 75 },
        ];
        localStorage.setItem('adminProducts', JSON.stringify(products));
      }
      return products;
    }

    function saveProductsToStorage(products) {
      localStorage.setItem('adminProducts', JSON.stringify(products));
    }

    function renderProductsTable() {
      const products = getProducts();
      const tbody = document.querySelector('#productsTable tbody');
      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No products found. Add one!</td></tr>';
        return;
      }
      tbody.innerHTML = products.map(p => `
        <tr>
          <td>${p.id}</td>
          <td>${p.name}</td>
          <td>$${p.buying_price.toFixed(2)}</td>
          <td>$${p.selling_price.toFixed(2)}</td>
          <td>${p.quantity_in_stock}</td>
          <td class="actions">
            <button class="btn btn-outline btn-sm" onclick="editProduct(${p.id})">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑️</button>
          </td>
        </tr>
      `).join('');
    }

    function openAddEditModal(productId = null) {
      const modal = document.getElementById('productModal');
      document.getElementById('productName').value = '';
      document.getElementById('buyingPrice').value = '';
      document.getElementById('sellingPrice').value = '';
      document.getElementById('quantityStock').value = '0';
      document.getElementById('editProductId').value = '';

      if (productId) {
        const products = getProducts();
        const product = products.find(p => p.id === productId);
        if (product) {
          document.getElementById('modalTitle').textContent = 'Edit Product';
          document.getElementById('productName').value = product.name;
          document.getElementById('buyingPrice').value = product.buying_price;
          document.getElementById('sellingPrice').value = product.selling_price;
          document.getElementById('quantityStock').value = product.quantity_in_stock;
          document.getElementById('editProductId').value = product.id;
        }
      } else {
        document.getElementById('modalTitle').textContent = 'Add Product';
      }
      modal.classList.add('active');
    }

    function closeProductModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    function saveProduct() {
      const id = document.getElementById('editProductId').value;
      const name = document.getElementById('productName').value.trim();
      const buying = parseFloat(document.getElementById('buyingPrice').value);
      const selling = parseFloat(document.getElementById('sellingPrice').value);
      const qty = parseInt(document.getElementById('quantityStock').value) || 0;
      if (!name || isNaN(buying) || isNaN(selling)) {
        alert('Please fill in all required fields.');
        return;
      }
      let products = getProducts();
      if (id) {
        // Edit existing
        const index = products.findIndex(p => p.id == id);
        if (index !== -1) {
          products[index] = { id: parseInt(id), name, buying_price: buying, selling_price: selling, quantity_in_stock: qty };
        }
      } else {
        // Add new
        const newId = products.length ? Math.max(...products.map(p=>p.id)) + 1 : 1;
        products.push({ id: newId, name, buying_price: buying, selling_price: selling, quantity_in_stock: qty });
      }
      saveProductsToStorage(products);
      renderProductsTable();
      closeProductModal();
    }

    function editProduct(id) {
      openAddEditModal(id);
    }

    function deleteProduct(id) {
      if (!confirm('Are you sure you want to delete this product?')) return;
      let products = getProducts();
      products = products.filter(p => p.id !== id);
      saveProductsToStorage(products);
      renderProductsTable();
    }

    // Close modal on overlay click
    document.getElementById('productModal').addEventListener('click', function(e) {
      if (e.target === this) closeProductModal();
    });

    // Initial render
    renderProductsTable();
  </script>
</body>
</html>
