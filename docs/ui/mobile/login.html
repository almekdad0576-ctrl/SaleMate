<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Order Calculator - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <div class="login-wrapper">
      <h1>📦 OrderCalc</h1>
      <p>Admin Login</p>
      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <input type="text" id="username" placeholder="Username" value="admin" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" value="admin" required>
        <button type="submit">Log In</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
  </div>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      if (user === 'admin' && pass === 'admin') {
        window.location.href = 'calculator.html';
      } else {
        document.getElementById('errorMsg').textContent = 'Invalid credentials. Try admin/admin.';
      }
    }
  </script>
</body>
</html>
